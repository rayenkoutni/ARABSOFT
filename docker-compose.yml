services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/portail_rh
      - KAFKA_BROKER=kafka:9092
      - JWT_SECRET=${JWT_SECRET:-arabsoft_secret}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - hr_network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: portail_rh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hr_network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    command: >
      bash -c "
        mkdir -p /var/lib/kafka/data
        CLUSTER_ID=$$(python3 -c 'import uuid; print(uuid.uuid4().hex[:22])')
        export KAFKA_NODE_ID=1
        export KAFKA_PROCESS_ROLES=broker,controller
        export KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
        export KAFKA_LISTENERS=PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
        export KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:29094
        export KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
        export KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
        export KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
        export KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
        export KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
        export KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
        export KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
        export KAFKA_LOG_DIRS=/var/lib/kafka/data
        export CLUSTER_ID=$${CLUSTER_ID}
        /etc/confluent/docker/run
      "
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_LISTENERS=PLAINTEXT://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:29094
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    ports:
      - "29094:9094"
    networks:
      - hr_network

networks:
  hr_network:
    driver: bridge

volumes:
  pgdata:
